version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: saqr-backend
    entrypoint: ["/entrypoint.sh"]
    environment:
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      # DB
      EXTERNAL_SQL_DB_HOST: ${EXTERNAL_SQL_DB_HOST}
      EXTERNAL_SQL_DB_PORT: ${EXTERNAL_SQL_DB_PORT}
      EXTERNAL_SQL_DB_USER: ${EXTERNAL_SQL_DB_USER}
      EXTERNAL_SQL_DB_PASSWORD: ${EXTERNAL_SQL_DB_PASSWORD}
      EXTERNAL_SQL_DB_NAME: ${EXTERNAL_SQL_DB_NAME}
      EXTERNAL_SQL_DB_POOL_SIZE: ${EXTERNAL_SQL_DB_POOL_SIZE}
      EXTERNAL_SQL_DB_MAX_OVERFLOW: ${EXTERNAL_SQL_DB_MAX_OVERFLOW}
      EXTERNAL_SQL_DB_ECHO: ${EXTERNAL_SQL_DB_ECHO}
      # AI
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL}
      BROWSER_EXECUTION_MODEL: ${BROWSER_EXECUTION_MODEL}
      BROWSER_PLANNER_MODEL: ${BROWSER_PLANNER_MODEL}
      # Google credentials (Coolify-friendly)
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - sakila-mysql

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
        EXPO_PUBLIC_BRAND_NAME: ${EXPO_PUBLIC_BRAND_NAME}
        EXPO_PUBLIC_BRAND_SLUG: ${EXPO_PUBLIC_BRAND_SLUG}
        EXPO_PUBLIC_APP_ENV: ${EXPO_PUBLIC_APP_ENV}
    container_name: saqr-frontend
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
      EXPO_PUBLIC_BRAND_NAME: ${EXPO_PUBLIC_BRAND_NAME}
      EXPO_PUBLIC_BRAND_SLUG: ${EXPO_PUBLIC_BRAND_SLUG}
      EXPO_PUBLIC_APP_ENV: ${EXPO_PUBLIC_APP_ENV}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: saqr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  sakila-mysql:
    build: ./scripts/sakila_db
    platform: linux/amd64
    container_name: saqr-sakila-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sakila
    ports:
      - "3306:3306"
    volumes:
      - sakila_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  sakila_mysql_data:
